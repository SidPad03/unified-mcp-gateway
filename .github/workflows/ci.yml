name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build-server:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        run: echo "SERVER_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}/mcp-gateway-server" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BASE=$(grep '^version' mcp-gateway-server/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          MAJOR_MINOR=$(echo "$BASE" | cut -d. -f1-2)

          EXISTING=$(gh release list --limit 100 --json tagName -q '.[].tagName' \
            | grep "^gateway-v${MAJOR_MINOR}\." \
            | sed "s/gateway-v${MAJOR_MINOR}\.//" \
            | sort -n | tail -1 || true)

          if [ -z "$EXISTING" ]; then
            PATCH=0
          else
            PATCH=$((EXISTING + 1))
          fi

          VERSION="${MAJOR_MINOR}.${PATCH}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Gateway version: ${VERSION}"

      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: ./mcp-gateway-server
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.SERVER_IMAGE }}:latest
            ${{ env.SERVER_IMAGE }}:${{ github.sha }}
            ${{ env.SERVER_IMAGE }}:v${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        run: echo "DASHBOARD_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}/mcp-gateway-dashboard" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BASE=$(grep '^version' mcp-gateway-server/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          MAJOR_MINOR=$(echo "$BASE" | cut -d. -f1-2)

          EXISTING=$(gh release list --limit 100 --json tagName -q '.[].tagName' \
            | grep "^gateway-v${MAJOR_MINOR}\." \
            | sed "s/gateway-v${MAJOR_MINOR}\.//" \
            | sort -n | tail -1 || true)

          if [ -z "$EXISTING" ]; then
            PATCH=0
          else
            PATCH=$((EXISTING + 1))
          fi

          VERSION="${MAJOR_MINOR}.${PATCH}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and push dashboard image
        uses: docker/build-push-action@v5
        with:
          context: ./mcp-gateway-dashboard
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.DASHBOARD_IMAGE }}:latest
            ${{ env.DASHBOARD_IMAGE }}:${{ github.sha }}
            ${{ env.DASHBOARD_IMAGE }}:v${{ steps.version.outputs.version }}
          build-args: APP_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release-gateway:
    runs-on: ubuntu-latest
    needs: [build-server, build-dashboard]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BASE=$(grep '^version' mcp-gateway-server/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          MAJOR_MINOR=$(echo "$BASE" | cut -d. -f1-2)

          EXISTING=$(gh release list --limit 100 --json tagName -q '.[].tagName' \
            | grep "^gateway-v${MAJOR_MINOR}\." \
            | sed "s/gateway-v${MAJOR_MINOR}\.//" \
            | sort -n | tail -1 || true)

          if [ -z "$EXISTING" ]; then
            PATCH=0
          else
            PATCH=$((EXISTING + 1))
          fi

          VERSION="${MAJOR_MINOR}.${PATCH}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="gateway-v${{ steps.version.outputs.version }}"
          gh release create "$TAG" \
            --title "Gateway v${{ steps.version.outputs.version }}" \
            --notes "MCP Gateway Server + Dashboard v${{ steps.version.outputs.version }}" \
            --target main

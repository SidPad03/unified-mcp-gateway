server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers. `always` so they're sent on error responses too.
    # The CSP allows the sources the dashboard actually uses: same-origin
    # scripts, inline styles (Tailwind), the brand icon CDNs used by the usage
    # graph (jsdelivr, simpleicons, unpkg, cursor.com), and the optional direct
    # OpenAI API call from the Settings page. connect-src allows ws:/wss: because
    # the live/usage graph WebSocket can point at a user-configured gateway URL
    # on any host; HTTP fetches stay restricted to same-origin + OpenAI.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https://cdn.jsdelivr.net https://cdn.simpleicons.org https://unpkg.com; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https://api.openai.com ws: wss:; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'" always;

    # SPA routing - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend (including WebSocket upgrades)
    location /api/ {
        proxy_pass http://mcp-gateway-server:3200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    # Proxy Prometheus metrics endpoint (moved to avoid SPA route conflict)
    location = /api/prometheus/metrics {
        proxy_pass http://mcp-gateway-server:3200/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

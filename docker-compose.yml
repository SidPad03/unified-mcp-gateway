services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mcpgateway
      POSTGRES_USER: mcpgateway
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mcpgateway}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcpgateway"]
      interval: 5s
      timeout: 5s
      retries: 5

  mcp-gateway-server:
    # Pre-built image from GHCR. Pin to a version (e.g. :v1.1.0) for reproducible
    # deploys, or use :latest to track the newest release.
    image: ghcr.io/sidpad03/unified-mcp-gateway/mcp-gateway-server:latest
    # The published images are currently linux/amd64 only; on Apple Silicon /
    # arm64 hosts Docker runs them via emulation. Remove this once multi-arch
    # images are published.
    platform: linux/amd64
    ports:
      - "3200:3200"
    environment:
      DATABASE_URL: postgresql://mcpgateway:${POSTGRES_PASSWORD:-mcpgateway}@postgres:5432/mcpgateway
      # Required — the server refuses to boot without a real secret. Set it in a
      # .env file next to this compose file (see .env.example), e.g.
      #   JWT_SECRET=$(openssl rand -hex 32)
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set — generate one with `openssl rand -hex 32` and put it in a .env file}
      # Optional: initial admin password. If unset, defaults to `admin` with a
      # forced password change on first login. Set it to choose your own.
      MCPGW_ADMIN_PASSWORD: ${MCPGW_ADMIN_PASSWORD:-}
      LISTEN_ADDR: "0.0.0.0:3200"
      RUST_LOG: mcp_gateway_server=info,tower_http=debug
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3200/metrics || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mcp-gateway-dashboard:
    image: ghcr.io/sidpad03/unified-mcp-gateway/mcp-gateway-dashboard:latest
    platform: linux/amd64
    ports:
      - "8080:80"
    depends_on:
      mcp-gateway-server:
        condition: service_healthy

volumes:
  postgres_data:
